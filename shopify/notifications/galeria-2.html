<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
  body{margin:0;background:#EDE9E3;font-family:'Manrope',Arial,sans-serif;padding:28px 18px 40px;}
  h1{font-size:18px;color:#0A0A0A;margin:0 0 4px;}
  p.sub{font-size:13px;color:#6B6660;margin:0 0 24px;}
  .row{display:flex;gap:22px;align-items:flex-start;justify-content:center;flex-wrap:nowrap;}
  .col{width:340px;flex:0 0 340px;}
  .tag{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#FF4000;text-align:center;margin:0 0 10px;}
  .frame{width:340px;height:940px;border-radius:14px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.10);background:#F5F3EF;}
  iframe{width:600px;height:1660px;border:0;transform:scale(.5667);transform-origin:top left;}
</style></head>
<body>
  <h1>Kit transacional Efizi — grupo sem trilha</h1>
  <p class="sub">Cancelado, Reembolso e Ativação de conta. Mesmo casco de marca dos e-mails de rastreio.</p>
  <div class="row">
    <div class="col"><p class="tag">Cancelado</p><div class="frame"><iframe src="cancelado-preview.html" scrolling="no"></iframe></div></div>
    <div class="col"><p class="tag">Reembolso</p><div class="frame"><iframe src="reembolso-preview.html" scrolling="no"></iframe></div></div>
    <div class="col"><p class="tag">Ativação de conta</p><div class="frame"><iframe src="ativacao-conta-preview.html" scrolling="no"></iframe></div></div>
  </div>
</body></html>
