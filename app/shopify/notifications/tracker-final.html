<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trilha final · ícones da marca</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
  body{margin:0;background:#F5F3EF;font-family:'Manrope','Helvetica Neue',Arial,sans-serif;color:#0A0A0A;}
  .wrap{max-width:640px;margin:0 auto;padding:40px 20px 60px;}
  .card{background:#fff;border-radius:18px;padding:34px 34px 30px;margin-bottom:24px;}
  .lbl{font-size:12px;font-weight:800;letter-spacing:2px;color:#FF4000;text-transform:uppercase;margin:0 0 26px;}
  .track{display:flex;align-items:flex-start;justify-content:space-between;}
  .step{flex:1;text-align:center;position:relative;z-index:2;}
  .step:not(:last-child)::after{content:"";position:absolute;top:23px;left:50%;width:100%;height:4px;background:#EAE5DE;z-index:-1;}
  .step.done:not(:last-child)::after{background:#FF4000;}
  .circle{width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;background:#EAE5DE;color:#B0ABA3;}
  .step.done .circle,.step.current .circle{background:#FF4000;color:#fff;}
  .step.current .circle{box-shadow:0 0 0 5px rgba(255,64,0,.16);}
  .circle svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .cap{margin-top:12px;font-size:13px;font-weight:700;line-height:1.25;color:#9A968F;}
  .step.done .cap{color:#0A0A0A;}
  .step.current .cap{color:#FF4000;}
  h2{font-size:15px;margin:0 0 18px;color:#6B6660;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <h2>Trilha com ícones da marca, preenchendo e-mail a e-mail &darr;</h2>

  <!-- states rendered below; JS injects the SVG icons -->
  <div class="card"><p class="lbl">E-mail 1 · Pedido confirmado</p><div class="track" data-active="0"></div></div>
  <div class="card"><p class="lbl">E-mail 2 · Pedido enviado</p><div class="track" data-active="1"></div></div>
  <div class="card"><p class="lbl">E-mail 3 · Saiu pra entrega</p><div class="track" data-active="2"></div></div>
  <div class="card"><p class="lbl">E-mail 4 · Pedido entregue</p><div class="track" data-active="3"></div></div>
</div>

<script>
  const ICONS = {
    check: '<polyline points="20 6 9 17 4 12"></polyline>',
    box: '<path d="M21 8v8a2 2 0 0 1-1 1.73l-7 4a2 2 0 0 1-2 0l-7-4A2 2 0 0 1 3 16V8a2 2 0 0 1 1-1.73l7-4a2 2 0 0 1 2 0l7 4A2 2 0 0 1 21 8z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>',
    truck: '<rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>',
    home: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>'
  };
  const STEPS = [
    {icon:'check', cap:'Confirmado'},
    {icon:'box',   cap:'Enviado'},
    {icon:'truck', cap:'Saiu pra entrega'},
    {icon:'home',  cap:'Entregue'}
  ];
  document.querySelectorAll('.track').forEach(track=>{
    const active = +track.dataset.active;
    STEPS.forEach((s,i)=>{
      const state = i < active ? 'done' : (i === active ? 'current' : '');
      track.insertAdjacentHTML('beforeend',
        '<div class="step '+state+'"><div class="circle"><svg viewBox="0 0 24 24">'+ICONS[s.icon]+'</svg></div><div class="cap">'+s.cap+'</div></div>');
    });
  });
</script>
</body>
</html>
